name: DynathiStoreBridge
version: 1.4.0
main: nl.dynathi.store.DynathiStoreBridge
api-version: '1.21'
author: Jv420
description: Pull-based delivery bridge between the DynathiSMP Vercel store and Paper.
commands:
  storebridge:
    description: Beheer DynathiStoreBridge
    usage: /storebridge <status|reload|check|license>
    permission: dynathistore.admin
  storegui:
    description: Open de DynathiSMP store beheer-GUI
    usage: /storegui
    permission: dynathistore.gui
  buy:
    description: Open de DynathiSMP spelerswebshop
    usage: /buy
    aliases: [webshop]
    permission: dynathistore.shop
permissions:
  dynathistore.admin:
    description: Beheer de DynathiStoreBridge plugin
    default: op
  dynathistore.gui:
    description: Open de DynathiSMP store beheer-GUI
    default: op
  dynathistore.shop:
    description: Open de DynathiSMP spelerswebshop
    default: true
